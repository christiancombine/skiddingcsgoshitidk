name: Steam Depot Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar p7zip-full lib32gcc-s1 lib32stdc++6

      - name: Install SteamCMD manually (FIXED)
        run: |
          mkdir -p steamcmd
          cd steamcmd

          curl -O https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          tar -xvzf steamcmd_linux.tar.gz

      - name: Run SteamCMD downloads
        run: |
          mkdir -p output

          ./steamcmd/steamcmd.sh +login anonymous \
            +download_depot 730 731 7043469183016184477 \
            +download_depot 730 732 4047004309608881181 \
            +quit

      - name: Collect depot files
        run: |
          mkdir -p output

          # SteamCMD default output path
          if [ -d "$HOME/Steam/steamapps/content/730" ]; then
            cp -r "$HOME/Steam/steamapps/content/730/"* output/
          fi

          if [ -d "$HOME/.steam/steam/steamapps/content/730" ]; then
            cp -r "$HOME/.steam/steam/steamapps/content/730/"* output/
          fi

      - name: Create .7z archive
        run: |
          7z a depot_build.7z output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-build
          path: depot_build.7z
