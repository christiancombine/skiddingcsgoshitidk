name: Steam Depot Downloader (Clean Windows)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/depot-download.yml

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Create folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force steamcmd
          New-Item -ItemType Directory -Force output

      - name: Download SteamCMD
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" `
            -OutFile steamcmd.zip

          Expand-Archive steamcmd.zip -DestinationPath steamcmd -Force

      - name: Run SteamCMD (MINIMAL - FIXED)
        shell: powershell
        run: |
          $steamcmd = "$env:GITHUB_WORKSPACE\steamcmd\steamcmd.exe"

          & $steamcmd `
            +login anonymous `
            +download_depot 730 731 7043469183016184477 `
            +download_depot 730 732 4047004309608881181 `
            +quit

      - name: Locate downloaded files
        shell: powershell
        run: |
          Get-ChildItem -Recurse "$env:USERPROFILE\Steam\steamapps\content" -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse "$env:PROGRAMFILES(x86)\Steam\steamapps\content" -ErrorAction SilentlyContinue

      - name: Copy output
        shell: powershell
        run: |
          $src1 = "$env:USERPROFILE\Steam\steamapps\content\730"
          $src2 = "$env:PROGRAMFILES(x86)\Steam\steamapps\content\730"

          if (Test-Path $src1) { Copy-Item $src1\* output -Recurse -Force }
          if (Test-Path $src2) { Copy-Item $src2\* output -Recurse -Force }

      - name: Install 7zip
        shell: powershell
        run: choco install 7zip -y

      - name: Create archive
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a depot_build.7z output\*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-build
          path: depot_build.7z
