name: Steam Depot Downloader (Stable Windows)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/depot-download.yml

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Setup folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force steamcmd
          New-Item -ItemType Directory -Force output
          New-Item -ItemType Directory -Force $env:GITHUB_WORKSPACE\steam_config

      - name: Download SteamCMD
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" `
            -OutFile steamcmd.zip

          Expand-Archive steamcmd.zip -DestinationPath steamcmd -Force

      - name: Force SteamCMD config bootstrap (IMPORTANT FIX)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force "$env:GITHUB_WORKSPACE\steamcmd\config"

      - name: Run SteamCMD (NO HANG FIXED)
        shell: powershell
        run: |
          $steamcmd = "$env:GITHUB_WORKSPACE\steamcmd\steamcmd.exe"

          $env:HOME = $env:GITHUB_WORKSPACE
          $env:STEAMCMDDIR = "$env:GITHUB_WORKSPACE\steamcmd"

          & $steamcmd -console `
            +@ShutdownOnFailedCommand 1 `
            +@NoPromptForPassword 1 `
            +login anonymous `
            +force_install_dir "$env:GITHUB_WORKSPACE\output" `
            +app_update 740 validate `
            +quit

          & $steamcmd -console `
            +@ShutdownOnFailedCommand 1 `
            +@NoPromptForPassword 1 `
            +login anonymous `
            +download_depot 730 731 7043469183016184477 `
            +download_depot 730 732 4047004309608881181 `
            +quit

      - name: Verify output
        shell: powershell
        run: |
          Write-Host "=== OUTPUT FILES ==="
          Get-ChildItem -Recurse "$env:GITHUB_WORKSPACE\output"

      - name: Install 7zip
        shell: powershell
        run: |
          choco install 7zip -y

      - name: Create archive
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a depot_build.7z "$env:GITHUB_WORKSPACE\output\*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-build
          path: depot_build.7z
