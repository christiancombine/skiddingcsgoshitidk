name: Steam Depot Downloader (FIXED)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/depot-download.yml

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Create folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force steamcmd
          New-Item -ItemType Directory -Force output

      - name: Download SteamCMD
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" `
            -OutFile steamcmd.zip

          Expand-Archive steamcmd.zip -DestinationPath steamcmd -Force

      - name: Run SteamCMD (FORCED NON-INTERACTIVE - FIXED)
        shell: cmd
        run: |
          steamcmd\steamcmd.exe +login anonymous +download_depot 730 731 7043469183016184477 +download_depot 730 732 4047004309608881181 +quit

      - name: Locate output
        shell: powershell
        run: |
          Get-ChildItem -Recurse "$env:USERPROFILE\Steam" -ErrorAction SilentlyContinue

      - name: Copy output
        shell: powershell
        run: |
          $src = "$env:USERPROFILE\Steam\steamapps\content\730"
          if (Test-Path $src) {
            Copy-Item "$src\*" output -Recurse -Force
          }

      - name: Install 7zip
        shell: powershell
        run: choco install 7zip -y

      - name: Create archive
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a depot_build.7z output\*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-build
          path: depot_build.7zl
