name: Steam Depot Downloader (Windows Stable)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/depot-download.yml

jobs:
  download:
    runs-on: windows-latest

    steps:
      - name: Create folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force steamcmd
          New-Item -ItemType Directory -Force output

      - name: Download SteamCMD
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" `
            -OutFile steamcmd.zip

          Expand-Archive steamcmd.zip -DestinationPath steamcmd -Force

      - name: Run SteamCMD (FIXED - NO HANG)
        shell: powershell
        run: |
          $steamcmd = "$env:GITHUB_WORKSPACE\steamcmd\steamcmd.exe"

          & $steamcmd -batchmode `
            +login anonymous `
            +download_depot 730 731 7043469183016184477 `
            +download_depot 730 732 4047004309608881181 `
            +quit

      - name: Find SteamCMD output
        shell: powershell
        run: |
          Write-Host "Searching for depot files..."
          Get-ChildItem -Recurse "$env:USERPROFILE\Steam" -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse "$env:PROGRAMFILES(x86)\Steam" -ErrorAction SilentlyContinue

      - name: Copy depot files to output
        shell: powershell
        run: |
          $paths = @(
            "$env:USERPROFILE\Steam\steamapps\content\730",
            "$env:PROGRAMFILES(x86)\Steam\steamapps\content\730"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Found: $p"
              Copy-Item "$p\*" "$env:GITHUB_WORKSPACE\output" -Recurse -Force
            }
          }

      - name: Install 7-Zip
        shell: powershell
        run: choco install 7zip -y

      - name: Create 7z archive
        shell: powershell
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a depot_build.7z "$env:GITHUB_WORKSPACE\output\*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-build
          path: depot_build.7z
